global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: spring-platform
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - service-registry:8761
          - config-server:8888
          - api-gateway:8080
          - auth-service:8081
          - monitoring-service:8082
          - alert-service:8083
          - notification-service:8084

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
