apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: observability
data:
  EUREKA_SERVER_URL: http://service-registry:8761/eureka/
  CONFIG_SERVER_URL: http://config-server:8888
  POSTGRES_HOST: postgresql
  POSTGRES_PORT: "5432"
  ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
  PROMETHEUS_URL: http://prometheus:9090
  NOTIFICATION_SERVICE_URL: http://notification-service:8084
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: observability
data:
  init.sql: |
    CREATE DATABASE authdb;
    CREATE DATABASE monitoringdb;
    CREATE DATABASE alertdb;
    CREATE DATABASE notificationdb;
    GRANT ALL PRIVILEGES ON DATABASE authdb TO observability;
    GRANT ALL PRIVILEGES ON DATABASE monitoringdb TO observability;
    GRANT ALL PRIVILEGES ON DATABASE alertdb TO observability;
    GRANT ALL PRIVILEGES ON DATABASE notificationdb TO observability;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: spring-platform
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - service-registry:8761
              - config-server:8888
              - api-gateway:8080
              - auth-service:8081
              - monitoring-service:8082
              - alert-service:8083
              - notification-service:8084
      - job_name: kubernetes-cadvisor
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
      - job_name: kube-state-metrics
        static_configs:
          - targets: ["kube-state-metrics.observability.svc.cluster.local:8080"]
